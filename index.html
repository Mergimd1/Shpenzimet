<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shpenzimet Mujore</title>
    <style>
        /* --- STILI (CSS) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        /* Ekranet */
        #login-screen, #app-screen { display: none; }
        
        h1 { color: #2c3e50; font-size: 32px; margin-bottom: 40px; }
        h2 { color: #1a252f; margin-bottom: 20px; text-align: center; }
        
        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            color: white;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-success { background-color: #27ae60; }
        .btn-success:hover { background-color: #219150; }
        .btn-secondary { background-color: #95a5a6; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .btn-logout { background-color: #e74c3c; margin-top: 20px;}
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #ced4da;
            border-radius: 8px; box-sizing: border-box; font-size: 15px;
        }
        
        .total-box {
            background: #2c3e50; color: white; padding: 20px; text-align: center;
            border-radius: 10px; margin-top: 25px; font-size: 22px; font-weight: bold;
        }
        
        .expense-list { list-style-type: none; padding: 0; margin-top: 25px; text-align: left; }
        .expense-item {
            background: #f8f9fa; border-left: 5px solid #3498db; margin-bottom: 12px;
            padding: 15px; border-radius: 8px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .expense-info strong { display: block; font-size: 16px; color: #2c3e50; }
        .expense-info span { font-size: 13px; color: #7f8c8d; }
        .expense-price { font-size: 18px; font-weight: bold; color: #e74c3c; }
        .delete-btn { background: none; color: #c0392b; border: none; padding: 5px; cursor: pointer; font-size: 18px; width: auto; margin-left: 10px;}
        .price-container { display: flex; align-items: center; }
        
        .user-btn { background-color: #f39c12; margin-bottom: 10px;}
        .user-btn:hover { background-color: #e67e22; }
    </style>
</head>
<body>

    <div class="container" id="home-screen">
        <h1>Shpenzimet Mujore</h1>
        <br>
        <div class="btn-group">
            <button class="btn-primary" style="margin-right:10px;" onclick="showLogin()">🔐 Kyçu</button>
            <button class="btn-success" onclick="createUser()">➕ Krijo Profil</button>
        </div>
    </div>

    <div class="container" id="login-screen">
        <h2>Kush po kyçet?</h2>
        <div id="users-list"></div>
        <button class="btn-secondary" onclick="goHome()">🔙 Kthehu</button>
    </div>

    <div class="container" id="app-screen">
        <h2>Mirësevjen, <span id="current-user-name"></span>!</h2>

        <div class="form-group">
            <label>📝 Përshkrimi</label>
            <input type="text" id="desc" placeholder="Psh: Blerje në market...">
        </div>

        <div class="form-group">
            <label>💶 Çmimi (€)</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>

        <div class="form-group">
            <label>📌 Kategoria</label>
            <select id="category">
                <option value="⛽ Naftë">⛽ Naftë</option>
                <option value="🚗 Automjet">🚗 Automjet</option>
                <option value="🍔 Ushqim">🍔 Ushqim</option>
                <option value="💎 Luks">💎 Luks</option>
                <option value="🎁 Dhurata">🎁 Dhurata</option>
                <option value="👗 Veshje">👗 Veshje</option>
                <option value="👧 Për Qikë">👧 Për Qikë</option>
            </select>
        </div>

        <button class="btn-success" onclick="addExpense()">➕ Ruaj Shpenzimin</button>

        <div class="total-box">
            Total këtë Muaj: <span id="total-amount">0.00</span> €
        </div>

        <ul class="expense-list" id="expense-list"></ul>
        
        <button class="btn-logout" onclick="logout()">🚪 Dil nga llogaria</button>
    </div>

    <script>
        /* --- LOGJIKA (JAVASCRIPT) --- */
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('perdoruesit')) || [];
        
        // Funksionet e Navigimit të Ekraneve
        function goHome() {
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'none';
        }

        function showLogin() {
            if(users.length === 0) {
                alert("Nuk ka asnjë profil. Të lutem krijo një profil fillimisht!");
                return;
            }
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            
            const usersListDiv = document.getElementById('users-list');
            usersListDiv.innerHTML = '';
            
            users.forEach(user => {
                const btn = document.createElement('button');
                btn.className = 'user-btn';
                btn.innerText = `👤 ${user}`;
                btn.onclick = () => login(user);
                usersListDiv.appendChild(btn);
            });
        }

        // Funksioni për të krijuar një profil të ri (për 4-5 persona)
        function createUser() {
            const userName = prompt("Shkruaj emrin e personit të ri:");
            if (userName && userName.trim() !== '') {
                if(!users.includes(userName.trim())) {
                    users.push(userName.trim());
                    localStorage.setItem('perdoruesit', JSON.stringify(users));
                    alert(`Profili për ${userName} u krijua me sukses! Tani mund të kyçesh.`);
                } else {
                    alert("Ky person ekziston tashmë!");
                }
            }
        }

        // Funksioni për t'u kyçur brenda profilit
        function login(userName) {
            currentUser = userName;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('current-user-name').innerText = currentUser;
            updateUI();
        }

        // Dalja nga llogaria
        function logout() {
            currentUser = null;
            goHome();
        }

        // Funksioni për të marrë shpenzimet e personit të kyçur
        function getUserExpenses() {
            return JSON.parse(localStorage.getItem(`shpenzimet_${currentUser}`)) || [];
        }

        // Funksioni për të ruajtur një shpenzim të ri
        function addExpense() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const date = new Date();

            if (desc.trim() === '' || isNaN(amount) || amount <= 0) {
                alert("Të lutem plotëso përshkrimin dhe çmimin saktë!");
                return;
            }

            let userExpenses = getUserExpenses();

            const expense = {
                id: Math.floor(Math.random() * 100000000),
                desc: desc,
                amount: amount,
                category: category,
                date: date.toISOString()
            };

            userExpenses.push(expense);
            localStorage.setItem(`shpenzimet_${currentUser}`, JSON.stringify(userExpenses));

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            updateUI();
        }

        // Fshirja e shpenzimit
        function deleteExpense(id) {
            let userExpenses = getUserExpenses();
            userExpenses = userExpenses.filter(exp => exp.id !== id);
            localStorage.setItem(`shpenzimet_${currentUser}`, JSON.stringify(userExpenses));
            updateUI();
        }

        // Përditësimi i ekranit të shpenzimeve
        function updateUI() {
            if(!currentUser) return;
            
            const list = document.getElementById('expense-list');
            const totalSpan = document.getElementById('total-amount');
            list.innerHTML = '';

            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            let total = 0;
            let userExpenses = getUserExpenses();

            const monthlyExpenses = userExpenses.filter(exp => {
                const expDate = new Date(exp.date);
                return expDate.getMonth() === currentMonth && expDate.getFullYear() === currentYear;
            });

            monthlyExpenses.forEach(exp => {
                total += exp.amount;
                const dateObj = new Date(exp.date);
                const formattedDate = dateObj.toLocaleDateString('sq-AL', { day: '2-digit', month: '2-digit', year: 'numeric' });

                const li = document.createElement('li');
                li.className = 'expense-item';
                li.innerHTML = `
                    <div class="expense-info">
                        <strong>${exp.category}</strong>
                        <span>${exp.desc} (${formattedDate})</span>
                    </div>
                    <div class="price-container">
                        <div class="expense-price">-${exp.amount.toFixed(2)}</div>
                        <button class="delete-btn" onclick="deleteExpense(${exp.id})" title="Fshi">✖</button>
                    </div>
                `;
                list.appendChild(li);
            });

            totalSpan.innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
