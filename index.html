<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergim Luxury Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            transform-style: preserve-3d;
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 10px;
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b38728 100%);
            color: #000;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            border: none;
        }

        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .history-item {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid #d4af37;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-card text-center">
        <h1 class="text-3xl font-bold mb-2">GOLDEN SYSTEM</h1>
        <p class="text-gray-400 mb-8">Mirësevini, Mergim</p>
        <input type="text" id="user" placeholder="ID: Mergim">
        <input type="password" id="pass" placeholder="Password: mega123">
        <button onclick="login()" class="btn-gold mt-4">Hyr në Panel</button>
    </div>

    <div id="dashboard" class="glass-card">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p id="current-date" class="text-xs text-gray-400 font-bold uppercase"></p>
                <h2 class="text-xl font-bold">Mergim Finance 💎</h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400 uppercase">Mbetja</p>
                <h2 id="balance-display" class="text-2xl font-bold text-white">0.00 €</h2>
            </div>
        </div>

        <div class="mb-6 p-4 border border-yellow-900/30 rounded-2xl bg-black/20">
            <label class="text-xs text-gray-400 uppercase">Vendos Rrogën (Start)</label>
            <div class="flex gap-2">
                <input type="number" id="salary-input" placeholder="p.sh. 500">
                <button onclick="setSalary()" class="btn-gold w-24">Set</button>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-sm font-semibold uppercase border-b border-yellow-900/30 pb-1">Shto Shpenzim të ri</h3>
            <select id="category">
                <option value="Ushqim">🍱 Ushqim</option>
                <option value="Shendetsi">🩺 Shëndetësi</option>
                <option value="Kerr per Qik">🚗 Kerr për Qikë</option>
                <option value="Nafte">⛽ Naftë</option>
                <option value="Tjera">📦 Tjera</option>
            </select>
            <input type="text" id="description" placeholder="Përshkrimi (p.sh. Blerje në market)">
            <input type="number" id="amount" placeholder="Shuma €">
            <button onclick="addExpense()" class="btn-gold">Regjistro Shpenzimin</button>
        </div>

        <div class="mt-8">
            <h3 class="text-sm font-semibold uppercase mb-2">Historia e Shpenzimeve</h3>
            <div id="history-list" class="max-h-60 overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <script>
        let balance = 0;

        // Set date
        const d = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = d.toLocaleDateString('sq-AL', options);

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "Mergim" && p === "mega123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("ID ose Password gabim!");
            }
        }

        function setSalary() {
            const val = parseFloat(document.getElementById('salary-input').value);
            if(val > 0) {
                balance = val;
                updateUI();
                alert("Rroga u vendos: " + val + "€");
            }
        }

        function addExpense() {
            const cat = document.getElementById('category').value;
            const desc = document.getElementById('description').value;
            const amt = parseFloat(document.getElementById('amount').value);

            if(!desc || !amt) {
                alert("Plotëso përshkrimin dhe shumën!");
                return;
            }

            if(amt > balance) {
                alert("Nuk ke mjaftueshëm para në rrogë!");
                return;
            }

            balance -= amt;
            updateUI();

            // Add to history
            const list = document.getElementById('history-list');
            const item = document.createElement('div');
            item.className = 'history-item';
            const time = new Date().toLocaleTimeString('sq-AL', {hour: '2-digit', minute:'2-digit'});
            
            item.innerHTML = `
                <div class="flex justify-between text-sm">
                    <span class="font-bold text-white">${cat}</span>
                    <span class="text-red-400">-${amt} €</span>
                </div>
                <div class="flex justify-between text-[10px] text-gray-400 uppercase mt-1">
                    <span>${desc}</span>
                    <span>${time}</span>
                </div>
            `;
            list.prepend(item);

            // Clear inputs
            document.getElementById('description').value = "";
            document.getElementById('amount').value = "";
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = balance.toFixed(2) + " €";
        }
    </script>
</body>
</html>
