<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergim Luxury Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 175, 55, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            transition: transform 0.5s ease;
        }

        .glass-card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .btn-gold {
            background: linear-gradient(135deg, #d4af37 0%, #f9e29c 50%, #b38728 100%);
            color: black;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            width: 100%;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:hover {
            filter: brightness(1.1);
        }

        #dashboard { display: none; }
        
        .expense-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .icon-3d {
            font-size: 40px;
            text-shadow: 2px 5px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="glass-card text-center">
        <div class="icon-3d">🔑</div>
        <h2 class="text-2xl font-bold mb-6">Sistemi Mergim</h2>
        <input type="text" id="username" placeholder="ID (Mergim)">
        <input type="password" id="password" placeholder="Password (mega123)">
        <button onclick="login()" class="btn-gold">Kyqu me Stil</button>
        <p id="error" class="text-red-500 mt-3 text-sm hidden">Të dhënat janë gabim!</p>
    </div>

    <div id="dashboard" class="glass-card">
        <h2 class="text-xl font-bold mb-6 text-center">Menaxhimi i Shpenzimeve 💎</h2>
        
        <div class="space-y-2">
            <label class="text-xs uppercase">🩺 Shëndetësi</label>
            <input type="number" id="health" placeholder="0 €">
            
            <label class="text-xs uppercase">🍱 Ushqim</label>
            <input type="number" id="food" placeholder="0 €">
            
            <label class="text-xs uppercase">🚗 Kerr për Qikë</label>
            <input type="number" id="car" placeholder="0 €">
            
            <label class="text-xs uppercase">⛽ Naftë</label>
            <input type="number" id="fuel" placeholder="0 €">
            
            <label class="text-xs uppercase">📦 Të gjitha tjerat</label>
            <input type="number" id="others" placeholder="0 €">
        </div>

        <button onclick="calculate()" class="btn-gold mt-6">Llogarit Totali</button>

        <div id="result" class="mt-6 text-center hidden">
            <p class="text-gray-400 text-sm">Totali Mujor:</p>
            <h1 id="total-amount" class="text-4xl font-bold text-white mt-1">0 €</h1>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(user === "Mergim" && pass === "mega123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function calculate() {
            const h = parseFloat(document.getElementById('health').value) || 0;
            const f = parseFloat(document.getElementById('food').value) || 0;
            const c = parseFloat(document.getElementById('car').value) || 0;
            const fu = parseFloat(document.getElementById('fuel').value) || 0;
            const o = parseFloat(document.getElementById('others').value) || 0;

            const total = h + f + c + fu + o;
            
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('total-amount').innerText = total.toLocaleString() + " €";
        }
    </script>
</body>
</html>
