<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergim | Luxury Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGIN STYLE */
        #login-screen {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }

        .icon-3d {
            font-size: 50px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--gold);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold); }

        /* DASHBOARD STYLE */
        #dashboard { display: none; width: 90%; max-width: 800px; padding: 20px; }

        .card {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .stats { display: flex; justify-content: space-around; font-size: 1.2rem; }
        .stats span { color: var(--gold); font-weight: bold; }

        .shpenzo-btn { background: #e74c3c; color: white; margin-top: 10px; }

        .list-item {
            background: rgba(255,255,255,0.05);
            margin: 5px 0;
            padding: 10px;
            border-left: 4px solid var(--gold);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="icon-3d">👑</div>
        <h2>MERGIM LUXE</h2>
        <input type="text" id="username" placeholder="ID: Mergim">
        <input type="password" id="password" placeholder="Password: mega123">
        <button onclick="checkLogin()">Kyçu në Sistemin 3D</button>
    </div>

    <div id="dashboard">
        <div class="card">
            <h2>Përshëndetje Mergim</h2>
            <div class="stats">
                <div>Rroga: <span id="rroga-val">€0</span></div>
                <div>Mbetja: <span id="mbetja-val">€0</span></div>
            </div>
            <input type="number" id="input-rroga" placeholder="Vendos rrogën mujore (€)">
            <button onclick="setRroga()">Përditëso Rrogën</button>
        </div>

        <div class="card">
            <h3>Regjistro Shpenzim</h3>
            <select id="kategoria">
                <option value="Rryma">⚡ Rryma</option>
                <option value="Uji">💧 Uji</option>
                <option value="Ushqimi">🛒 Ushqimi</option>
                <option value="Luks">✨ Luks</option>
                <option value="Internet">🌐 Internet</option>
                <option value="Kredit">🏦 Kredit</option>
                <option value="Naft">⛽ Naftë</option>
                <option value="Automjet">🚗 Automjet</option>
                <option value="Veshje">👕 Veshje</option>
                <option value="Telefon">📱 Telefon IPKO</option>
            </select>
            <input type="number" id="shuma" placeholder="Sa euro (€)?">
            <textarea id="shenimi" placeholder="Çfarë keni bërë me këto të holla?"></textarea>
            <button class="shpenzo-btn" onclick="addShpenzim()">Zbrit nga Rroga</button>
        </div>

        <div class="card">
            <h3>Historia e Shpenzimeve</h3>
            <div id="historia"></div>
        </div>
    </div>

    <script>
        let rrogaTotale = 0;
        let mbetja = 0;

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === "Mergim" && pass === "mega123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("ID ose Password i gabuar!");
            }
        }

        function setRroga() {
            rrogaTotale = parseFloat(document.getElementById('input-rroga').value);
            mbetja = rrogaTotale;
            updateUI();
        }

        function addShpenzim() {
            const shuma = parseFloat(document.getElementById('shuma').value);
            const kategoria = document.getElementById('kategoria').value;
            const shenimi = document.getElementById('shenimi').value;
            const data = new Date().toLocaleDateString();

            if(isNaN(shuma)) return alert("Vendos nje shume!");

            mbetja -= shuma;
            
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<span><strong>${kategoria}</strong>: ${shenimi} (${data})</span> <span>-€${shuma}</span>`;
            
            document.getElementById('historia').prepend(item);
            updateUI();

            // AI MENDIMI
            if(kategoria === "Luks") {
                alert("Mergim, kujdes me Luksin! Mbetja po zbret, por stili mbetet.");
            }
        }

        function updateUI() {
            document.getElementById('rroga-val').innerText = "€" + rrogaTotale;
            document.getElementById('mbetja-val').innerText = "€" + mbetja;
        }
    </script>
</body>
</html>
