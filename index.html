<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mergim | Exclusive Finance 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
            --red: #ff4d4d;
            --green: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            background-image: radial-gradient(circle at top right, #1a1a1a 0%, #000 100%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN */
        #login-screen {
            align-self: center;
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid var(--border);
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 15px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #aa8928 100%);
            border: none;
            color: #000;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* DASHBOARD */
        #dashboard { display: none; width: 95%; max-width: 600px; padding-top: 40px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); text-align: center; }
        .stat-box strong { font-size: 1.5rem; color: var(--gold); display: block; }

        /* ARKIVA MODAL (FULL SCREEN) */
        #arkiva-page {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .arkiva-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid var(--gold);
        }

        .item-main { display: flex; justify-content: space-between; font-weight: 600; font-size: 1.1rem; }
        .item-date { font-size: 0.75rem; color: #666; margin-top: 10px; }
        
        .close-btn { background: #fff; color: #000; width: auto; padding: 10px 25px; }
        .open-arkiva-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

    </style>
</head>
<body>

    <div id="login-screen">
        <div style="font-size: 60px; margin-bottom: 10px;">💎</div>
        <h2 style="letter-spacing: 3px;">MERGIM PRIVÉ</h2>
        <input type="text" id="username" placeholder="ID Mergim">
        <input type="password" id="password" placeholder="Password mega123">
        <button onclick="checkLogin()">Kyçu në Sistemin 3D</button>
    </div>

    <div id="dashboard">
        <div class="card">
            <div class="stats-grid">
                <div class="stat-box"><span>RROGA</span><strong id="rroga-val">€0</strong></div>
                <div class="stat-box"><span>MBETJA</span><strong id="mbetja-val">€0</strong></div>
            </div>
            <input type="number" id="input-rroga" placeholder="Vendos rrogën mujore (€)">
            <button onclick="setRroga()">Përditëso Buxhetin</button>
        </div>

        <div class="card">
            <h3 style="color: var(--gold); margin-top: 0;">SHPENZIM I RI</h3>
            <select id="kategoria">
                <option value="🛒 Ushqimi">🛒 Ushqimi</option>
                <option value="✨ Luks">✨ Luks</option>
                <option value="⛽ Naftë">⛽ Naftë</option>
                <option value="🚗 Automjet">🚗 Automjet</option>
                <option value="👧 Për Qikën">👧 Për Qikën</option>
                <option value="🏦 Kredit">🏦 Kredit</option>
                <option value="⚡ Rryma">⚡ Rryma</option>
                <option value="💧 Uji">💧 Uji</option>
                <option value="🌐 Internet">🌐 Internet</option>
                <option value="👕 Veshje">👕 Veshje</option>
                <option value="📱 Telefon IPKO">📱 Telefon IPKO</option>
                <option value="📞 Telekos">📞 Telekos</option>
                <option value="🌀 Tjera">🌀 Tjera</option>
            </select>
            <input type="number" id="shuma" placeholder="Sa euro (€)?">
            <textarea id="shenimi" rows="2" placeholder="Shkruaj çfarë ke blerë..."></textarea>
            <button onclick="addShpenzim()" style="background: #fff; color: #000;">Regjistro & Zbrit</button>
        </div>

        <button class="open-arkiva-btn" onclick="toggleArkiva(true)">📂 SHIKO ARKIVËN E PLOTË</button>
    </div>

    <div id="arkiva-page">
        <div class="arkiva-header">
            <h2 style="color: var(--gold); margin: 0;">ARKIVA FINANCIARE</h2>
            <button class="close-btn" onclick="toggleArkiva(false)">MBYLL ✕</button>
        </div>
        
        <div id="lista-shpenzimeve">
            </div>

        <center>
            <button onclick="resetTeGjitha()" style="background: none; border: 1px solid #ff4d4d; color: #ff4d4d; width: auto; font-size: 0.8rem; margin-top: 50px;">
                FSHI TË GJITHA TË DHËNAT
            </button>
        </center>
    </div>

    <script>
        let rrogaTotale = parseFloat(localStorage.getItem('rroga')) || 0;
        let mbetja = parseFloat(localStorage.getItem('mbetja')) || 0;
        let historia = JSON.parse(localStorage.getItem('historia')) || [];

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "Mergim" && p === "mega123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                updateUI();
            } else {
                alert("ID ose Password gabim!");
            }
        }

        function setRroga() {
            const val = parseFloat(document.getElementById('input-rroga').value);
            if(isNaN(val)) return;
            rrogaTotale = val;
            mbetja = val;
            saveData();
            updateUI();
        }

        function addShpenzim() {
            const shuma = parseFloat(document.getElementById('shuma').value);
            const kategoria = document.getElementById('kategoria').value;
            const shenimi = document.getElementById('shenimi').value || "Blerje";
            const data = new Date().toLocaleString('sq-AL');

            if(isNaN(shuma) || shuma <= 0) return;

            mbetja -= shuma;
            historia.unshift({ kategoria, shuma, shenimi, data });

            saveData();
            updateUI();
            
            document.getElementById('shuma').value = "";
            document.getElementById('shenimi').value = "";
            alert("U regjistrua me sukses!");
        }

        function toggleArkiva(show) {
            const el = document.getElementById('arkiva-page');
            el.style.display = show ? 'block' : 'none';
            if(show) ndertoListen();
        }

        function ndertoListen() {
            const container = document.getElementById('lista-shpenzimeve');
            container.innerHTML = historia.length === 0 ? "<p style='text-align:center; color:#666;'>Nuk ka shpenzime të regjistruara.</p>" : "";
            
            historia.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="item-main">
                        <span>${item.kategoria}</span>
                        <span style="color:var(--red)">- €${item.shuma.toFixed(2)}</span>
                    </div>
                    <div style="color:#aaa; font-size:0.9rem; margin-top:5px;">${item.shenimi}</div>
                    <div class="item-date">${item.data}</div>
                `;
                container.appendChild(div);
            });
        }

        function saveData() {
            localStorage.setItem('rroga', rrogaTotale);
            localStorage.setItem('mbetja', mbetja);
            localStorage.setItem('historia', JSON.stringify(historia));
        }

        function updateUI() {
            document.getElementById('rroga-val').innerText = "€" + rrogaTotale.toLocaleString();
            document.getElementById('mbetja-val').innerText = "€" + mbetja.toLocaleString();
            document.getElementById('mbetja-val').style.color = mbetja < 0 ? "var(--red)" : "var(--green)";
        }

        function resetTeGjitha() {
            if(confirm("A jeni i sigurt? Çdo gjë do të fshihet.")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
